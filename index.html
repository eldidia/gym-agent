<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#06060f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>GymAgent</title>
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body, #root { height: 100%; }
      body { background: #06060f; font-family: system-ui, -apple-system, 'Segoe UI', Tahoma, sans-serif; overscroll-behavior: none; -webkit-font-smoothing: antialiased; }
      input, button, select, textarea { font-family: inherit; font-size: 16px; }
      :root { --app-h: 100vh; }
      @keyframes blink {
        0%, 100% { opacity: 0.25; transform: scale(0.75); }
        50%       { opacity: 1;    transform: scale(1); }
      }
      ::-webkit-scrollbar { width: 0; height: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      const setH = () => document.documentElement.style.setProperty('--app-h', window.innerHeight + 'px');
      window.addEventListener('resize', setH);
      setH();
    </script>
  </body>
</html>
